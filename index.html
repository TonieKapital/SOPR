<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STH-SOPR Dashboard by Tonie Kapital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="dashboard">
        <header class="glass-header">
            <div class="stats-grid">
                <div class="stat-card stat-btc">
                    <span class="stat-label">CENA BTC (Bitstamp)</span>
                    <span class="stat-value" id="val-btc">Ładowanie...</span>
                </div>
                <div class="stat-card stat-sopr">
                    <span class="stat-label">STH-SOPR</span>
                    <span class="stat-value" id="val-sopr">Ładowanie...</span>
                </div>
                <div class="stat-card stat-status">
                    <span class="stat-label">STAN RYNKU STH</span>
                    <span class="stat-value" id="val-status">Ładowanie...</span>
                </div>
            </div>
        </header>
        
        <div id="loading" class="loading-state">
            <div class="spinner"></div> Pobieranie historii rynkowej oraz wskaźnika STH-SOPR...
        </div>
        
        <div class="timeframe-selector" style="display: none;" id="controls-bar">
            <button class="tf-btn" id="toggle-log">Skala BTC: Log</button>
            <button class="tf-btn" id="toggle-zones">Nałóż cykl</button>
            <span style="width: 1px; height: 16px; background: rgba(255,255,255,0.1); margin: 0 4px; align-self: center;"></span>
            <button class="tf-btn active toggle-btn" data-series="btc">Cena BTC</button>
            <button class="tf-btn active toggle-btn" data-series="sopr">Wskaźnik STH-SOPR</button>
        </div>

        <div id="chart-wrapper" style="display: none;">
            <div id="chart-main"></div>
            <div id="tv-tooltip"></div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
