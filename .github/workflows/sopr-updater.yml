name: Auto Update On-Chain Model

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  scrape-and-commit:
    name: Scrape Latest Data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Scrape STH Data
        run: node scripts/update-sopr.js

      - name: Scrape LTH Data
        run: node scripts/update-lth.js

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/sth-realised-price.json
          git add data/sth-sopr.json
          git add data/lth-realised-price.json
          git add data/lth-sopr.json
          
          if git diff --cached --quiet; then
            echo "[INFO] Brak nowych modyfikacji."
          else
            git commit -m "chore(data): automatyczna aktualizacja danych blockchain [skip ci]"
            git push origin HEAD:main
          fi
