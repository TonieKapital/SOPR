name: Auto Update STH Realised Price

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  scrape-and-commit:
    name: Scrape Latest Data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Execute Scraper Script
        run: node scripts/update-sopr.js

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Zmieniono nazwę dodawanego pliku, aby pasowała do STH Realised Price
          git add data/sth-realised-price.json
          
          if git diff --cached --quiet; then
            echo "[INFO] Brak nowych modyfikacji. Pomijanie procesu commit/push."
          else
            echo "[INFO] Wykryto nowe dane. Tworzenie commita..."
            git commit -m "chore(data): automatyczna aktualizacja wskaźnika STH Realised Price [skip ci]"
            git push origin HEAD:main
          fi
